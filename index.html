<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Examen PRO MAX</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family:Arial; margin:0; }

.login {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    background:#0a3d91;
    color:white;
}

input { margin:10px; padding:10px; }
button { padding:10px; margin:5px; cursor:pointer; }

.exam { display:flex; height:100vh; }
.left { width:50%; background:#0a3d91; color:white; padding:40px; }
.right { width:50%; padding:40px; display:flex; flex-direction:column; justify-content:space-between; }

.alert {
    color:red;
    font-size:22px;
    font-weight:bold;
}
</style>
</head>

<body oncontextmenu="return false">

<div class="login" id="login">
    <h1>EXAMEN DE PRUEBA 1</h1>
    <input id="name" placeholder="Nombre completo">
    <input id="account" placeholder="No. Cuenta">
    <button onclick="startExam()">Iniciar Examen</button>
    <button onclick="askPassword()">Panel Maestro</button>
</div>

<div class="exam" id="exam" style="display:none;">
    <div class="left"><h2 id="question"></h2></div>
    <div class="right">
        <div id="timer"></div>
        <div id="answers"></div>
        <button onclick="nextQuestion()">Siguiente</button>
    </div>
</div>

<script>
const { jsPDF } = window.jspdf;

const PASSWORD = "9907";

const questions = [
    { question:"2+2", options:["3","4","5","6"], correct:1 },
    { question:"Capital de México", options:["GDL","CDMX","MTY","PUE"], correct:1 },
    { question:"5x3", options:["15","10","20","8"], correct:0 }
];

let name="", account="";
let current=0, interval;

let totalTime = questions.length*65;
let time = totalTime;

let answersUser = new Array(questions.length).fill(null);

/* 🚫 DETECCIÓN DE TRAMPAS */
let cheatingDetected = false;

document.addEventListener("keydown", e=>{
    if(e.ctrlKey && ["c","v","x"].includes(e.key)){
        e.preventDefault();
        cheatingDetected = true;
    }
});

document.addEventListener("visibilitychange", ()=>{
    if(document.hidden){
        cheatingDetected = true;
        endExam();
    }
});

/* LOGIN */
function startExam(){
    name=document.getElementById("name").value;
    account=document.getElementById("account").value;

    if(!name || !account) return alert("Completa datos");

    login.style.display="none";
    exam.style.display="flex";

    loadQuestion();
    interval=setInterval(updateTimer,1000);
}

function loadQuestion(){
    let q=questions[current];
    question.textContent=q.question;

    answers.innerHTML="";
    q.options.forEach((opt,i)=>{
        let btn=document.createElement("button");
        btn.textContent=opt;

        btn.onclick=()=>answersUser[current]=i;

        answers.appendChild(btn);
    });
}

function updateTimer(){
    timer.textContent=time+"s";
    if(time<=0) endExam();
    time--;
}

function nextQuestion(){
    if(current<questions.length-1){
        current++;
        loadQuestion();
    } else endExam();
}

/* FINALIZAR */
function endExam(){
    clearInterval(interval);

    let correct=0;

    questions.forEach((q,i)=>{
        if(answersUser[i]===q.correct) correct++;
    });

    let totalUsed = totalTime-time;

    let finalScore = cheatingDetected ? 0 : correct;

    let result = {
        name,
        account,
        score: finalScore+"/"+questions.length,
        time: totalUsed,
        cheating: cheatingDetected
    };

    let data = JSON.parse(localStorage.getItem("results")||"[]");
    data.push(result);
    localStorage.setItem("results", JSON.stringify(data));

    showResults(result);
}

/* RESULTADOS */
function showResults(r){

    let cheatingMessage = r.cheating 
        ? `<p class="alert">⛔ Reprobado por intento de hacer trampa</p>` 
        : "";

    document.body.innerHTML=`
    <div style="padding:30px;">
        <h1>Resultados</h1>

        ${cheatingMessage}

        <p><b>${r.name}</b> - ${r.account}</p>
        <p>Calificación: ${r.score}</p>
        <p>Tiempo total: ${r.time}s</p>

        <button onclick="downloadPDF()">Descargar PDF</button>
    </div>`;

    window.lastResult = r;
}

/* PDF */
function downloadPDF(){
    let doc=new jsPDF();
    let r=window.lastResult;

    doc.text("Resultados del examen",10,10);
    doc.text(`Alumno: ${r.name}`,10,20);
    doc.text(`Cuenta: ${r.account}`,10,30);
    doc.text(`Calificación: ${r.score}`,10,40);
    doc.text(`Tiempo: ${r.time}s`,10,50);

    if(r.cheating){
        doc.text("REPROBADO POR INTENTO DE TRAMPA",10,60);
    }

    doc.save("resultado.pdf");
}

/* PANEL */
function askPassword(){
    let pass = prompt("Contraseña:");
    if(pass==="9907") openPanel();
    else alert("Incorrecta");
}

function openPanel(){
    let data = JSON.parse(localStorage.getItem("results")||"[]");

    let rows="";
    data.forEach(r=>{
        rows+=`
        <tr>
            <td>${r.name}</td>
            <td>${r.account}</td>
            <td>${r.score}</td>
            <td>${r.time}s</td>
            <td>${r.cheating ? "⛔ Trampa" : "OK"}</td>
        </tr>`;
    });

    document.body.innerHTML=`
    <div style="padding:30px;">
        <h1>Panel Maestro</h1>
        <button onclick="location.reload()">Volver</button>

        <table border="1">
            <tr>
                <th>Nombre</th>
                <th>Cuenta</th>
                <th>Calificación</th>
                <th>Tiempo</th>
                <th>Estado</th>
            </tr>
            ${rows}
        </table>
    </div>`;
}
</script>

</body>
</html>
